<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>KargoSmart - Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { "colors": { "outline": "#767683", "on-secondary-fixed-variant": "#005046", "tertiary-fixed": "#ffdbd0", "on-surface": "#1a1c1c", "inverse-on-surface": "#f1f1f1", "on-tertiary": "#ffffff", "surface-container-high": "#e8e8e8", "primary": "#000666", "surface-container-lowest": "#ffffff", "surface-variant": "#e2e2e2", "on-primary-fixed": "#000767", "tertiary-fixed-dim": "#ffb59d", "error-container": "#ffdad6", "tertiary": "#380b00", "secondary-container": "#9defde", "inverse-primary": "#bdc2ff", "inverse-surface": "#2f3131", "surface-dim": "#dadada", "on-primary": "#ffffff", "error": "#ba1a1a", "background": "#f9f9f9", "on-error": "#ffffff", "on-secondary": "#ffffff", "surface": "#f9f9f9", "surface-bright": "#f9f9f9", "tertiary-container": "#5c1800", "on-primary-fixed-variant": "#343d96", "on-background": "#1a1c1c", "on-secondary-container": "#0f6f62", "on-tertiary-fixed-variant": "#7b2e12", "secondary": "#046b5e", "primary-fixed-dim": "#bdc2ff", "surface-container-highest": "#e2e2e2", "secondary-fixed-dim": "#84d5c5", "on-surface-variant": "#454652", "on-tertiary-fixed": "#390c00", "surface-container": "#eeeeee", "on-primary-container": "#8690ee", "surface-tint": "#4c56af", "on-tertiary-container": "#e17c5a", "on-error-container": "#93000a", "primary-container": "#1a237e", "secondary-fixed": "#a0f2e1", "outline-variant": "#c6c5d4", "primary-fixed": "#e0e0ff", "on-secondary-fixed": "#00201b", "surface-container-low": "#f3f3f3" }, "borderRadius": { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" }, "spacing": { "stack-sm": "0.5rem", "container-padding": "2rem", "stack-md": "1rem", "gutter": "1.5rem", "sidebar-width": "280px", "stack-lg": "2rem" }, "fontFamily": { "h3": ["Inter"], "data-tabular": ["Inter"], "body-lg": ["Inter"], "label-sm": ["Inter"], "h2": ["Inter"], "h1": ["Inter"], "body-md": ["Inter"] }, "fontSize": { "h3": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }], "data-tabular": ["14px", { "lineHeight": "1", "fontWeight": "500" }], "body-lg": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }], "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }], "h2": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }], "h1": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }], "body-md": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }] } } } }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .icon-fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-4 antialiased">
    <!-- Ambient Background Elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-primary-fixed rounded-full blur-[120px] opacity-40"></div>
        <div class="absolute top-[60%] -right-[10%] w-[40%] h-[40%] bg-secondary-fixed rounded-full blur-[100px] opacity-30"></div>
    </div>

    <!-- Login Card -->
    <main class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.05)] border border-surface-variant p-8 md:p-10 z-10 relative">
        <!-- Branding Header -->
        <header class="flex flex-col items-center text-center mb-stack-lg border-b border-surface-variant pb-stack-md">
            <div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center mb-4 shadow-sm">
                <span class="material-symbols-outlined text-on-primary text-[28px] icon-fill">local_shipping</span>
            </div>
            <h1 class="font-h2 text-h2 text-primary tracking-tight mb-1">KargoSmart</h1>
            <p class="font-body-md text-body-md text-on-surface-variant">Global Command Center</p>
        </header>

        <!-- Login Form -->
        <form class="space-y-stack-md">
            <!-- Email Field -->
            <div>
                <label class="block font-label-sm text-label-sm text-on-surface mb-stack-sm uppercase" for="email">Kurumsal E-posta</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
                    <input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" placeholder="isim@sirket.com" required="" type="email">
                </div>
            </div>

            <!-- Password Field -->
            <div>
                <div class="flex justify-between items-end mb-stack-sm">
                    <label class="block font-label-sm text-label-sm text-on-surface uppercase" for="password">Şifre</label>
                    <a class="font-label-sm text-label-sm text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Şifremi Unuttum?</a>
                </div>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
                    <input class="w-full pl-10 pr-10 py-3 bg-surface-container-lowest border border-outline rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" placeholder="Şifrenizi giriniz" required="" type="password">
                    <button aria-label="Şifreyi göster/gizle" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
                        <span class="material-symbols-outlined text-[20px]">visibility</span>
                    </button>
                </div>
            </div>

            <!-- Remember Me -->
            <div class="flex items-center">
                <input class="w-4 h-4 rounded border-outline focus:ring-primary" id="remember" type="checkbox">
                <label class="ml-2 font-body-md text-body-md text-on-surface-variant cursor-pointer" for="remember">Beni hatırla</label>
            </div>

            <!-- Login Button -->
            <div class="pt-stack-sm">
                <button class="w-full bg-primary text-on-primary font-label-sm text-label-sm uppercase py-3.5 rounded-lg hover:bg-on-primary-fixed-variant active:bg-primary-container shadow-sm hover:shadow-md transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                    Giriş Yap
                    <span class="material-symbols-outlined text-[18px]">login</span>
                </button>
            </div>
        </form>

        <!-- Footer Note -->
        <div class="mt-stack-lg text-center">
            <p class="font-body-md text-[13px] text-on-surface-variant">
                Yetkisiz erişim yasaktır. Sistem hareketleri kayıt altına alınmaktadır.
            </p>
        </div>

        <!-- Back to Home -->
        <div class="mt-stack-md text-center border-t border-surface-variant pt-stack-md">
            <a th:href="@{/}" class="font-body-md text-body-md text-primary hover:text-on-primary-fixed-variant transition-colors">← Ana Sayfa'ya Dön</a>
        </div>
    </main>
</body>
</html>
